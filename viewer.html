<!DOCTYPE html>
<html>

<head>
  <title>Live Logs</title>
</head>

<body>

  <h2>Live Logs</h2>

  <pre id="logs"></pre>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script>

    const logsEl = document.getElementById("logs");

    // Eski loglarni yuklash
    async function loadOldLogs() {
      const res = await fetch("http://localhost:3001/test/logs");
      const data = await res.json();
      data.logs.forEach(line => {
        logsEl.textContent += line + "\n";
      });
    }

    // Avval eski loglarni yukla
    loadOldLogs();

    // Keyin real-time loglarni tinglash
    const socket = io("http://localhost:3001");

    socket.on("log", (data) => {
      logsEl.textContent += data;
    });

  </script>

</body>

</html>
